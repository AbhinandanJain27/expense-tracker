name: Deploy Application to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  buils-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: expense-tracker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: expense-tracker/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build for production
        run: npm run build

      - name: Set Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Deploy to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx angular-cli-ghpages --dir=dist/expense-tracker/browser/browser --repo=https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git --no-silent